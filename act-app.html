<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>心向 · ACT 练习</title>
  <style>
    :root{--ink:#15383a;--teal:#087b71;--mint:#e5f5f1;--bg:#f2f7f5;--line:#d5e7e2;--muted:#617a79;--soft:#f7fbfa;--amber:#ffefd1}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"Microsoft YaHei","PingFang SC",sans-serif;color:var(--ink)}button,input,textarea{font:inherit}.app{width:min(100%,440px);min-height:100dvh;margin:auto;background:#fff}.head{padding:calc(18px + env(safe-area-inset-top)) 20px 12px;border-bottom:1px solid #edf3f1;display:flex;justify-content:space-between;align-items:center}.badge{font-size:11px;color:var(--teal);background:var(--mint);padding:6px 8px;border-radius:9px;white-space:nowrap}.nav{display:flex;gap:4px;padding:9px 12px;border-bottom:1px solid #edf3f1;overflow:auto}.nav button{border:0;background:#fff;color:var(--muted);padding:9px 10px;font-size:12px;white-space:nowrap;min-height:40px}.nav button.active{background:var(--mint);color:var(--teal);font-weight:bold;border-radius:8px}.view{padding:21px 20px calc(34px + env(safe-area-inset-bottom))}.hide{display:none}h1{font-size:27px;line-height:1.3;margin:8px 0}h2{font-size:21px;line-height:1.35;margin:6px 0}.sub,.small{font-size:12px;color:var(--muted);line-height:1.7}.card{border:1px solid var(--line);border-radius:18px;padding:15px;margin:13px 0}.soft{background:var(--soft)}.today{border-left:4px solid var(--teal);background:linear-gradient(145deg,#e6f6f1,#fff)}.label{font-size:13px;font-weight:700;display:block;margin:14px 0 6px}.field{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;resize:vertical;color:var(--ink);font-size:16px;background:#fff}.btn{width:100%;border:0;border-radius:13px;background:var(--teal);color:#fff;font-weight:bold;padding:14px;margin:9px 0;min-height:48px}.btn.outline{background:#fff;color:var(--teal);border:1px solid #87c7bf}.btn.ghost{background:var(--mint);color:var(--teal)}.link{border:0;background:none;color:var(--teal);font-weight:bold;font-size:12px;padding:6px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.choice{border:1px solid var(--line);border-radius:13px;background:#fff;padding:12px;text-align:left;font-size:13px;min-height:66px;color:var(--ink)}.choice.on{background:var(--mint);border-color:var(--teal);color:var(--teal);font-weight:bold}.choice span{display:block;color:var(--muted);font-weight:normal;font-size:11px;margin-top:4px;line-height:1.45}.progress{height:6px;border-radius:4px;background:#e5efec;margin:14px 0}.progress i{display:block;height:100%;background:var(--teal);border-radius:4px}.answer{border-left:3px solid var(--teal);padding:11px;background:var(--mint);font-size:13px;line-height:1.7;margin:13px 0}.pills{display:flex;gap:7px;flex-wrap:wrap}.pill{border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 10px;border-radius:10px;font-size:12px;min-height:40px}.record{padding:12px;border-left:3px solid var(--teal);background:#f8fbfa;margin:10px 0;font-size:12px;line-height:1.7}.top{display:flex;justify-content:space-between;align-items:center;gap:10px}.empty{text-align:center;color:var(--muted);font-size:13px;padding:28px 10px}.toast{display:none;position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#153a38;color:#fff;padding:10px 15px;border-radius:22px;font-size:12px;z-index:5;max-width:88%;text-align:center}.modal{position:fixed;inset:0;background:#14343280;display:grid;place-items:end center;z-index:4}.modal.hide{display:none}.sheet{width:min(100%,440px);background:#fff;border-radius:22px 22px 0 0;padding:20px max(20px,env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) max(20px,env(safe-area-inset-left));max-height:84dvh;overflow:auto}.mode{border:1px solid var(--line);border-radius:18px;padding:16px;margin:12px 0;background:#fff}.mode b{font-size:16px}.mode p{margin:6px 0}.course-card{background:linear-gradient(145deg,#fff9ed,#fff);border-color:#f0deb7}.course-card .badge{background:var(--amber);color:#71521c}.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 10px;font-size:12px;color:var(--ink)}.chip.on{background:var(--mint);border-color:var(--teal);color:var(--teal);font-weight:bold}.chips{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}.divider{height:1px;background:#edf3f1;margin:17px 0}details{background:var(--soft);border-radius:12px;padding:11px;margin:13px 0}summary{font-size:13px;color:var(--teal);font-weight:bold;cursor:pointer}.step-note{background:#fff7e4;border-left:3px solid #e1ac4a;padding:10px;font-size:12px;line-height:1.7;margin:12px 0}.history-heading{margin:22px 0 8px;font-size:17px}@media(max-width:360px){.view{padding-left:16px;padding-right:16px}.grid{grid-template-columns:1fr}.head{padding-left:16px;padding-right:16px}}@media(min-width:600px){.app{box-shadow:0 16px 50px #123d3920;min-height:780px;margin-top:18px}}
  </style>
</head>
<body>
  <main class="app">
    <header class="head"><b>心向</b><span class="badge">心理灵活性</span></header>
    <nav class="nav">
      <button class="active" data-page="home">今天</button>
      <button data-page="action">价值行动</button>
      <button data-page="course">课程</button>
      <button data-page="practice">练习</button>
      <button data-page="history">回顾</button>
    </nav>
    <section id="home" class="view"></section>
    <section id="action" class="view hide"></section>
    <section id="course" class="view hide"></section>
    <section id="practice" class="view hide"></section>
    <section id="history" class="view hide"></section>
  </main>
  <div id="toast" class="toast"></div>
  <div id="modal" class="modal hide"><div id="sheet" class="sheet"></div></div>
  <script>
    const $=id=>document.getElementById(id);
    const API_BASE=location.protocol==='file:'?'http://127.0.0.1:8788':location.origin;
    const store={get:(k,d)=>{try{return JSON.parse(localStorage.getItem('act'+k)||JSON.stringify(d))}catch{return d}},set:(k,v)=>localStorage.setItem('act'+k,JSON.stringify(v)),del:k=>localStorage.removeItem('act'+k)};
    const day=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
    const id=()=>crypto.randomUUID?.()||`${Date.now()}-${Math.random().toString(16).slice(2)}`;
    const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const note=message=>{$('toast').textContent=message;$('toast').style.display='block';clearTimeout(note.timer);note.timer=setTimeout(()=>$('toast').style.display='none',2600)};
    const domains=[['关系','真诚、关心、连接'],['健康与照顾','友善、可持续地照顾自己'],['工作与学习','专注、好奇、负责'],['成长与创造','探索、练习、创造'],['休息与乐趣','恢复、玩耍、享受'],['贡献与社区','连接、帮助、参与']];
    const experiences=[['thought','念头 / 担心'],['emotion','情绪'],['body','身体感受'],['urge','想逃开或拖延']];
    const practices={
      present:{name:'当下觉察',detail:'回到此刻，不必改变正在发生的事。',duration:'约 1 分钟',steps:['先停一下，慢慢看一看周围。说出你看见的三样东西。','留意两种声音，以及身体和椅子、地面接触的感觉。','不需要让感受消失。只对自己说：此刻，我在这里。']},
      defusion:{name:'和念头拉开一点距离',detail:'从念头中退半步，而不是与它争论。',duration:'约 1 分钟',steps:['留意一个反复出现、让你卡住的念头。','在它前面加上：我注意到，我有一个念头说……','再读一遍这句话。念头还在，但你可以选择如何回应它。']},
      accept:{name:'为感受留位',detail:'给不舒服的感受一点空间。',duration:'约 2 分钟',steps:['注意此刻最想推开的感受、念头或身体反应。','轻轻命名它：我注意到，___ 正在这里。','试着说：它可以暂时在这里；我不必先把它解决掉。']},
      self:{name:'观察自我',detail:'记得你不只是一段念头或一阵情绪。',duration:'约 2 分钟',steps:['注意此刻的一个念头、一种感受或身体感觉。','再注意：有一部分你，正在看见这些经验。','不需要定义自己。只留在这个能观察的位置几次呼吸。']},
      values:{name:'辨认真正在意的方向',detail:'在结果不确定时，仍选择想成为的样子。',duration:'约 2 分钟',steps:['想一件你在意的事，或一个重要的人。','即使结果暂时无法掌控，你想怎样对待自己或对方？','把它写成一个方向，而不是要完成的成绩。']},
      commit:{name:'承诺行动',detail:'把方向缩小成今天可以尝试的一步。',duration:'约 3 分钟',steps:['选一个你在意的方向，不必选最难的。','问问自己：今天最小、最具体的一步是什么？','决定做到什么程度也算完成，然后允许自己只先开始。']}
    };
    const courseModules=[
      {key:'present',title:'第 1 节 · 回到当下',duration:'约 5 分钟',summary:'注意力可以回到此刻，而不必等状态变好。',steps:['看一看身边三样事物，听一听两种声音。','注意身体的接触点和呼吸的自然起伏。','问自己：此刻最小、最实际的下一步是什么？']},
      {key:'defusion',title:'第 2 节 · 与念头拉开距离',duration:'约 5 分钟',summary:'念头是经验，不是命令或事实。',steps:['写下一个最近反复出现的念头。','在前面加上：我注意到，我有一个念头说……','选择是否按这个念头行动，或做一个更贴近价值的动作。']},
      {key:'accept',title:'第 3 节 · 为感受留位',duration:'约 5 分钟',summary:'不舒服可以存在，不必先被消除。',steps:['注意一个此刻不想有的感受或身体反应。','给它一个简单名称，不分析也不评判。','轻轻说：它可以暂时在这里，我仍能选择下一步。']},
      {key:'self',title:'第 4 节 · 观察自我',duration:'约 5 分钟',summary:'你不等于某个念头、标签或一阵情绪。',steps:['注意此刻的一段念头或一种感受。','再留意：有一部分你正在看见它。','从“我就是这样”改为“我正在注意到这样的经验”。']},
      {key:'values',title:'第 5 节 · 价值方向',duration:'约 6 分钟',summary:'价值是持续的做法，不是必须达成的结果。',steps:['想一件在意的事，先不解决它。','即使结果不确定，你希望怎样对待自己或他人？','把答案写成可持续的方向，而不是成绩。']},
      {key:'commit',title:'第 6 节 · 承诺行动',duration:'约 6 分钟',summary:'带着不确定感，也可以走一小步。',steps:['选一个你看重的方向。','把它缩小到今天十分钟内或更小的动作。','决定做到什么程度也算完成，并允许自己只先开始。']}
    ];
    const commitments=()=>store.get('Commitments',[]);
    const practiceHistory=()=>store.get('PracticeHistory',[]);
    const courseProgress=()=>store.get('CourseProgress',{startedAt:'',sessions:[]});
    let flow=null,aiState=null,session=null,reviewState=null;

    function show(page){document.querySelectorAll('.view').forEach(x=>x.classList.add('hide'));$(page).classList.remove('hide');document.querySelectorAll('[data-page]').forEach(x=>x.classList.toggle('active',x.dataset.page===page));if(page==='home')renderHome();if(page==='action')renderAction();if(page==='course')renderCourse();if(page==='practice')renderPractice();if(page==='history')renderHistory()}
    document.querySelectorAll('[data-page]').forEach(button=>button.onclick=()=>{if(button.dataset.page==='action'&&!flow)begin();else show(button.dataset.page)});
    function latestPending(){return commitments().find(x=>x.date===day()&&x.status==='pending')}
    function lastSeven(items){const cutoff=new Date();cutoff.setDate(cutoff.getDate()-6);cutoff.setHours(0,0,0,0);return items.filter(x=>new Date(`${x.date}T00:00:00`)>=cutoff)}
    function recommendedModule(){const progress=courseProgress();if(!progress.startedAt)return courseModules[0];const started=new Date(`${progress.startedAt}T00:00:00`),now=new Date(`${day()}T00:00:00`);const index=Math.min(courseModules.length-1,Math.max(0,Math.floor((now-started)/86400000)));return courseModules[index]}
    function renderHome(){const pending=latestPending(),actions=lastSeven(commitments()),done=actions.filter(x=>['done','partial'].includes(x.status)).length,practiceCount=lastSeven(practiceHistory()).length,progress=courseProgress(),completed=new Set(progress.sessions.map(x=>x.module)).size,recommend=recommendedModule();$('home').innerHTML=`<div class="top"><span class="badge">给自己一点空间</span><span class="badge">近 7 天 ${done} 次行动 · ${practiceCount} 次练习</span></div><h1>今天，朝在意的方向走一点</h1><p class="sub">心理灵活性不是没有困难，而是无论顺利或卡住，都能更贴近自己在意的方向。</p>${pending?commitCard(pending):`<div class="card today"><b>今天想从哪里开始？</b><p class="small">你可以推进一个目标，也可以处理一件卡住的事。</p><button class="btn" onclick="begin('goal')">推进今天的目标</button><button class="btn outline" onclick="begin('stuck')">处理一件卡住的事</button></div>`}<div class="card course-card"><div class="top"><b>今日课程</b><span class="badge">${completed}/6 已完成</span></div><p><b>${esc(recommend.title)}</b></p><p class="small">${esc(recommend.summary)}</p><button class="btn outline" onclick="startCourse('${recommend.key}')">开始今天这一节</button></div><div class="card"><div class="top"><b>快速练习</b><button class="link" onclick="show('practice')">查看全部 ›</button></div><p class="small">先留一两分钟，再决定下一步。</p><div class="grid" id="quick"></div></div><div class="card soft"><b>近 7 天</b><p class="small">${actions.length||practiceCount?`共有 ${actions.length} 条行动记录、${practiceCount} 次独立练习。每一次记录都在帮助你了解什么更适合。`:'还没有行动或练习记录。一个很小的开始就够了。'}</p></div>`;const quick=$('quick');['present','defusion','accept','commit'].forEach(key=>{const p=practices[key],b=document.createElement('button');b.className='choice';b.innerHTML=`${esc(p.name)}<span>${esc(p.detail)}</span>`;b.onclick=()=>startPractice(key);quick.append(b)})}
    function commitCard(c){const mode=c.entryMode==='stuck'?'卡住路径':'目标路径';return `<div class="card today"><div class="top"><span class="badge">${mode}</span><span class="small">${esc(c.domain||'未记录')}</span></div><p class="small">${c.goal?'想推进：':''}</p>${c.goal?`<b>${esc(c.goal)}</b>`:`<b>${esc(c.valueDirection||c.value||'未记录')}</b>`}<p class="small">方向：${esc(c.valueDirection||c.value||'未记录')}</p><p class="small">${esc(c.timing||'时机未记录')} · ${esc(c.action||'行动未记录')}</p><p class="small">做到这里也算完成：${esc(c.minimumAcceptable||'未记录')}</p><div class="pills"><button class="pill" onclick="openReview('${c.id}','done')">完成了</button><button class="pill" onclick="openReview('${c.id}','partial')">部分完成</button><button class="pill" onclick="openReview('${c.id}','skipped')">未完成</button><button class="pill" onclick="openReview('${c.id}','paused')">暂停</button></div></div>`}

    function blankFlow(mode=''){return {mode,step:mode?1:0,domain:'',goal:'',situation:'',experienceKinds:[],experienceNote:'',actResponse:'',rawValue:'',valueDirection:'',action:'',timing:'',minimum:''}}
    function begin(mode=''){flow=blankFlow(mode);aiState=null;show('action')}
    function path(){if(!flow?.mode)return [];return flow.mode==='goal'?['mode','domain','goal','value','action','confirm']:['mode','domain','situation','experience','response','value','action','confirm']}
    function chooseMode(mode){flow=blankFlow(mode);renderAction()}
    function renderAction(){if(!flow)flow=blankFlow();const steps=path();const key=steps[flow.step]||'mode';const titles={mode:['你现在需要什么？','两条路径都可以通往有意义的行动。'],domain:['这件事属于哪个生活领域？','先选一个此刻最重要的地方。'],goal:['今天想推进什么？','结果目标可以保留；下一步会把它和价值方向区分开。'],situation:['发生了什么，让你卡住？','用一句话描述具体情境，不需要写得完整。'],experience:['当下有什么在拉住你？','选择你注意到的体验；可补充一点自己的话。'],response:['先为这些体验留一点空间','不是为了消除它们，而是练习不被它们完全带着走。'],value:['即使结果不确定，你想怎样做这件事？','这是一种持续的价值方向，不是必须完成的成绩。'],action:['把方向缩成今天的一小步','写下动作、时机和做到什么程度也算完成。'],confirm:['确认这次尝试','它可以调整，不是必须完成的任务。']};const [title,intro]=titles[key];let html=`<span class="badge">${flow.mode==='stuck'?'卡住路径':'价值行动'}</span>${flow.mode?`<div class="progress"><i style="width:${Math.max(12,flow.step/(steps.length-1)*100)}%"></i></div><p class="small">第 ${flow.step} 步 / ${steps.length-1}</p>`:''}<h1>${title}</h1><p class="sub">${intro}</p><div id="flowBody"></div><div class="top"><button id="flowBack" class="link">${flow.step?'‹ 上一步':'返回今天'}</button><button id="flowNext" class="btn" style="width:auto;min-width:150px">${key==='confirm'?'保存行动':'下一步'}</button></div>`;$('action').innerHTML=html;renderFlowBody(key);$('flowBack').onclick=()=>{if(flow.step===0){flow=null;show('home')}else{flow.step--;renderAction()}};$('flowNext').onclick=advance}
    function renderFlowBody(key){const body=$('flowBody');if(key==='mode'){body.innerHTML=`<button class="mode" onclick="chooseMode('goal')"><b>推进一个目标 / 方向</b><p class="small">我有想完成或想持续推进的事，目前不一定有卡点。</p></button><button class="mode" onclick="chooseMode('stuck')"><b>处理一件卡住的事</b><p class="small">我正被某个情境、念头、感受或冲动拉住，想先为它留一点空间。</p></button>`;return}if(key==='domain'){body.innerHTML=`<div class="grid">${domains.map(([name,detail])=>`<button class="choice ${flow.domain===name?'on':''}" onclick="setDomain('${name}')">${esc(name)}<span>${esc(detail)}</span></button>`).join('')}</div>`;return}if(key==='goal'){body.innerHTML=field('goal','想推进的目标或结果是什么？',flow.goal,'例如：完成报告的第一版、跑完 5 公里。',3);bind('goal',v=>flow.goal=v);return}if(key==='situation'){body.innerHTML=field('situation','发生了什么？',flow.situation,'例如：看到待办堆着，我一直没有打开文档。',3);bind('situation',v=>flow.situation=v);return}if(key==='experience'){body.innerHTML=`<div class="chips">${experiences.map(([v,label])=>`<button class="chip ${flow.experienceKinds.includes(v)?'on':''}" onclick="toggleExperience('${v}')">${label}</button>`).join('')}</div>${field('experienceNote','想补充一点什么吗？（可选）',flow.experienceNote,'例如：脑子里一直说“做不好就别开始”。',3)}`;bind('experienceNote',v=>flow.experienceNote=v);return}if(key==='response'){const guide=practiceForFlow();body.innerHTML=`<div class="answer"><b>先注意到</b><br>${esc(responseText())}</div><p class="small">你不必同意这些念头或喜欢这种感受；只要试着确认，它们此刻正在这里。</p><div class="grid">${[['notice','我注意到了'],['willing','它可以在这里，我愿意走一点'],['pause','我先停 30 秒'],['hard','现在很难，我把下一步缩小']].map(([v,label])=>`<button class="choice ${flow.actResponse===v?'on':''}" onclick="setResponse('${v}')">${label}</button>`).join('')}</div><details><summary>想多做一分钟？打开「${esc(practices[guide].name)}」</summary><button class="link" onclick="startPractice('${guide}')">开始这项练习 ›</button></details>`;return}if(key==='value'){body.innerHTML=`${field('value','在这件事上，你想怎样对待自己或他人？',flow.rawValue,'例如：即使进度不完美，也诚实而耐心地推进。',3)}<button class="btn outline" onclick="askAI('value')">帮我厘清方向</button>${aiBox('value')}`;bind('value',v=>flow.rawValue=v);return}if(key==='action'){body.innerHTML=`${field('action','今天想做什么？',flow.action,'例如：打开文档，列出三个小标题。',2)}${field('timing','大概什么时候做？',flow.timing,'例如：午饭后坐回电脑前。',2)}${field('minimum','做到什么程度也算完成？',flow.minimum,'例如：只写出一个标题也算完成。',2)}<button class="btn outline" onclick="askAI('action')">帮我调整得更好开始</button>${aiBox('action')}${flow.mode==='goal'?`<details><summary>如果后来卡住</summary><p class="small">不必预设困难。真的卡住时，可以随时回来做一分钟练习。</p><button class="link" onclick="startPractice('present')">打开当下觉察 ›</button></details>`:''}`;bind('action',v=>flow.action=v);bind('timing',v=>flow.timing=v);bind('minimum',v=>flow.minimum=v);return}if(key==='confirm'){const original=flow.mode==='stuck'?`<p class="small">情境：${esc(flow.situation||'未记录')}<br>注意到：${esc(flow.experienceKinds.map(x=>Object.fromEntries(experiences)[x]||x).join('、')||'未记录')}</p>`:`<p class="small">目标：${esc(flow.goal||'未记录')}</p>`;body.innerHTML=`<div class="answer">${original}<b>价值方向</b><br>${esc(flow.valueDirection||flow.rawValue)}<div class="divider"></div><b>今天的小行动</b><br>${esc(flow.timing)}，${esc(flow.action)}<br><span class="small">做到这里也算完成：${esc(flow.minimum)}</span></div><p class="small">完成后再如实回顾实际发生了什么。现在不用预设或解决所有困难。</p>`}}
    function field(name,label,value,placeholder,rows){return `<label class="label" for="${name}">${label}</label><textarea id="${name}" class="field" rows="${rows}" maxlength="240" placeholder="${esc(placeholder)}">${esc(value)}</textarea>`}
    function bind(name,fn){const input=$(name);if(input)input.oninput=()=>fn(input.value)}
    function syncFlowFields(){if(!flow)return;const values={goal:'goal',situation:'situation',experienceNote:'experienceNote',value:'rawValue',action:'action',timing:'timing',minimum:'minimum'};Object.entries(values).forEach(([input,key])=>{const field=$(input);if(field)flow[key]=field.value})}
    function setDomain(value){syncFlowFields();flow.domain=value;renderAction()}
    function toggleExperience(value){syncFlowFields();flow.experienceKinds=flow.experienceKinds.includes(value)?flow.experienceKinds.filter(x=>x!==value):[...flow.experienceKinds,value];renderAction()}
    function setResponse(value){flow.actResponse=value;renderAction()}
    function practiceForFlow(){if(flow.experienceKinds.includes('thought'))return 'defusion';if(flow.experienceKinds.includes('emotion')||flow.experienceKinds.includes('body'))return 'accept';return 'present'}
    function responseText(){const key=practiceForFlow();return key==='defusion'?'在心里试着补全：我注意到，我有一个念头说……':key==='accept'?'轻轻命名：我注意到，这份感受或身体反应正在这里。':'看看周围，留意一件看见的事、一种声音和身体的接触点。'}
    function aiBox(kind){if(!aiState||aiState.kind!==kind)return '';if(aiState.loading)return `<div class="card soft"><b>AI 正在整理</b><p class="small">只呈现最终建议，不显示推理过程。</p></div>`;return `<div class="card soft"><b>${kind==='value'?'AI 对方向的整理':'AI 对行动的建议'}</b><p class="small">${esc(aiState.message)}</p>${aiState.value?`<div class="answer"><b>可选的价值方向</b><br>${esc(aiState.value)}<br><button class="link" onclick="applyAI('value')">采用这个方向</button></div>`:''}${aiState.action?`<div class="answer"><b>可选的行动版本</b><br>${esc(aiState.action)}<br><button class="link" onclick="applyAI('action')">采用这个行动</button></div>`:''}</div>`}
    async function askAI(kind){syncFlowFields();const value=flow.rawValue.trim();if(kind==='value'&&!value){note('先写一句自己的方向或结果愿望。');return}if(kind==='action'&&!flow.action.trim()){note('先写下今天想做什么。');return}aiState={kind,loading:true};renderAction();const context=kind==='value'?{stage:'value',domain:flow.domain,value:flow.rawValue}:{stage:'action',domain:flow.domain,value:flow.valueDirection||flow.rawValue,action:flow.action,timing:flow.timing,minimum_acceptable:flow.minimum};try{const response=await fetch(`${API_BASE}${kind==='value'?'/api/act/guide':'/api/act/reflection'}`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(context)});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.message||'服务暂时没有返回结果。');aiState={kind,message:data.message||'这是一个可调整的建议。',value:data.value_direction||'',action:data.suggested_action||''}}catch(error){aiState={kind,message:`AI 暂不可用（${error instanceof Error?error.message:'请稍后重试'}）。你仍可按自己的话继续。`,value:'',action:''}}renderAction()}
    function applyAI(kind){if(kind==='value'&&aiState?.value)flow.valueDirection=aiState.value;if(kind==='action'&&aiState?.action)flow.action=aiState.action;renderAction()}
    function validStep(key){if(key==='mode'){note('请选择一条路径。');return false}if(key==='domain'&&!flow.domain){note('先选一个生活领域。');return false}if(key==='goal'&&!flow.goal.trim()){note('先写下你想推进的目标。');return false}if(key==='situation'&&!flow.situation.trim()){note('先写一句发生了什么。');return false}if(key==='experience'&&!flow.experienceKinds.length){note('至少选择一类你注意到的体验。');return false}if(key==='response'&&!flow.actResponse){note('先选择一句此刻更贴近你的回应。');return false}if(key==='value'&&!flow.rawValue.trim()){note('先写下你想怎样对待自己或他人。');return false}if(key==='action'&&(!flow.action.trim()||!flow.timing.trim()||!flow.minimum.trim())){note('补全动作、时机和最低完成标准。');return false}return true}
    function advance(){syncFlowFields();const steps=path(),key=steps[flow.step];if(key==='confirm'){saveCommitment();return}if(!validStep(key))return;if(key==='value'&&!flow.valueDirection)flow.valueDirection=flow.rawValue.trim();flow.step++;renderAction()}
    function saveCommitment(){const items=commitments().filter(x=>!(x.date===day()&&x.status==='pending'));items.unshift({id:id(),date:day(),entryMode:flow.mode,domain:flow.domain,goal:flow.goal.trim(),situation:flow.situation.trim(),experienceKinds:flow.experienceKinds,experienceNote:flow.experienceNote.trim(),actResponse:flow.actResponse,valueDirection:(flow.valueDirection||flow.rawValue).trim(),action:flow.action.trim(),timing:flow.timing.trim(),minimumAcceptable:flow.minimum.trim(),status:'pending',reflection:'',nextStep:'',reviewExperienceKinds:[]});store.set('Commitments',items);flow=null;aiState=null;note('行动已保存。');show('home')}

    function renderPractice(){$('practice').innerHTML=`<span class="badge">可选 · 1–3 分钟</span><h1>给心一点空间</h1><p class="sub">这些工具不是任务；在你觉得有用时再打开。</p>${Object.entries(practices).map(([key,p])=>`<div class="record"><div class="top"><b>${esc(p.name)}</b><span class="badge">${esc(p.duration)}</span></div><span class="small">${esc(p.detail)}</span><br><button class="link" onclick="startPractice('${key}')">开始练习 ›</button></div>`).join('')}`}
    function renderCourse(){const progress=courseProgress(),done=new Set(progress.sessions.map(x=>x.module));$('course').innerHTML=`<span class="badge">每日推荐 · 可补做</span><h1>六日 ACT 路径</h1><p class="sub">每天推荐一节；错过不会算失败，任何一节都可以随时练习或复习。</p><div class="progress"><i style="width:${done.size/6*100}%"></i></div><p class="small">已完成 ${done.size} / 6 节</p>${courseModules.map(module=>`<div class="record"><div class="top"><b>${esc(module.title)}</b><span class="badge">${done.has(module.key)?'已完成':esc(module.duration)}</span></div><span class="small">${esc(module.summary)}</span><br><button class="link" onclick="startCourse('${module.key}')">${done.has(module.key)?'复习这一节 ›':'开始这一节 ›'}</button></div>`).join('')}`}
    function startPractice(key){startSession('practice',key)}
    function startCourse(key){startSession('course',key)}
    function startSession(type,key){const source=type==='practice'?practices[key]:courseModules.find(x=>x.key===key);if(!source)return;session={type,key,source,step:0};renderSession()}
    function renderSession(){const s=session,source=s.source,total=source.steps.length;$('sheet').innerHTML=`<div class="top"><span class="badge">${esc(source.duration)}</span><button class="link" onclick="closeModal()">关闭</button></div><h2>${esc(source.name||source.title)}</h2><p class="small">${s.type==='course'?esc(source.summary):esc(source.detail)}</p><div class="progress"><i style="width:${(s.step+1)/total*100}%"></i></div><p class="small">第 ${s.step+1} 步 / ${total}</p><div class="answer">${esc(source.steps[s.step])}</div><button class="btn" onclick="nextSession()">${s.step===total-1?'完成练习':'下一步'}</button>`;$('modal').classList.remove('hide')}
    function nextSession(){if(session.step<session.source.steps.length-1){session.step++;renderSession();return}$('sheet').innerHTML=`<div class="top"><span class="badge">完成</span><button class="link" onclick="closeModal()">关闭</button></div><h2>谢谢你留出了这几分钟</h2><p class="sub">不需要有特别的感受。如果想，留一句你注意到的事；也可以直接保存。</p><label class="label">此刻注意到什么？（可选）</label><textarea id="sessionNote" class="field" rows="3" maxlength="240" placeholder="例如：念头还在，但我能先停一下。"></textarea><button class="btn" onclick="saveSession()">保存这次${session.type==='course'?'课程':'练习'}</button>`}
    function saveSession(){const observation=$('sessionNote').value.trim();if(session.type==='practice'){const records=practiceHistory();records.unshift({id:id(),type:session.key,name:session.source.name,date:day(),observation});store.set('PracticeHistory',records)}else{const progress=courseProgress();if(!progress.startedAt)progress.startedAt=day();progress.sessions.unshift({id:id(),module:session.key,title:session.source.title,date:day(),observation});store.set('CourseProgress',progress)}closeModal();session=null;note('已保存。');show('home')}

    function openReview(commitmentId,status){const c=commitments().find(x=>x.id===commitmentId);if(!c)return;reviewState={id:commitmentId,status,kinds:[],reflection:'',nextStep:''};renderReview()}
    function renderReview(){const state=reviewState,c=commitments().find(x=>x.id===state.id),needs=state.status!=='done';$('sheet').innerHTML=`<div class="top"><span class="badge">今日回顾</span><button class="link" onclick="closeModal()">关闭</button></div><h2>${state.status==='done'?'你做到了这一步':'谢谢你如实记录'}</h2><p class="sub">${needs?'不必解释成失败。看看实际发生了什么，再决定下一步怎样更贴合你。':'如果想，可以留下一点收获或观察。'}</p>${needs?`<p class="step-note">${c.entryMode==='stuck'&&c.situation?`你当时写的是：${esc(c.situation)}`:'如果过程中出现卡点，你可以只记录它，而不必立即解决它。'}</p>`:''}<label class="label">${needs?'发生了什么？（可选）':'想记下一点观察吗？（可选）'}</label><textarea id="reviewNote" class="field" rows="3" maxlength="240">${esc(state.reflection)}</textarea>${needs?`<label class="label">注意到什么在拉住你？（可选）</label><div class="chips">${experiences.map(([v,label])=>`<button class="chip ${state.kinds.includes(v)?'on':''}" onclick="toggleReview('${v}')">${label}</button>`).join('')}</div><label class="label">下次想怎样更灵活调整？（可选）</label><textarea id="reviewNext" class="field" rows="2" maxlength="180">${esc(state.nextStep)}</textarea>`:''}<button class="btn" onclick="saveReview()">保存回顾</button>`;$('modal').classList.remove('hide')}
    function captureReview(){reviewState.reflection=$('reviewNote')?.value.trim()||'';reviewState.nextStep=$('reviewNext')?.value.trim()||''}
    function toggleReview(value){captureReview();reviewState.kinds=reviewState.kinds.includes(value)?reviewState.kinds.filter(x=>x!==value):[...reviewState.kinds,value];renderReview()}
    function saveReview(){captureReview();const items=commitments(),c=items.find(x=>x.id===reviewState.id);if(!c)return;c.status=reviewState.status;c.reflection=reviewState.reflection;c.nextStep=reviewState.nextStep;c.reviewExperienceKinds=reviewState.kinds;store.set('Commitments',items);closeModal();reviewState=null;note('回顾已保存。');show('home')}

    function renderHistory(){const actions=commitments(),practiceRecords=practiceHistory(),courses=courseProgress().sessions;$('history').innerHTML=`<div class="top"><span class="badge">本地记录</span><button class="link" onclick="clearAll()">清空全部</button></div><h1>回顾你的方向</h1>${actions.length?`<h2 class="history-heading">价值行动</h2>${actions.map(c=>`<div class="record"><div class="top"><b>${esc(c.date)} · ${esc(c.domain||'未记录')}</b><button class="link" onclick="deleteAction('${c.id}')">删除</button></div><span class="badge">${c.entryMode==='stuck'?'卡住路径':'目标路径'}</span>${c.goal?`<br>目标：${esc(c.goal)}`:''}${c.situation?`<br><span class="small">情境：${esc(c.situation)}</span>`:''}<br>方向：${esc(c.valueDirection||c.value||'未记录')}<br>行动：${esc(c.action||'未记录')}<br><span class="small">时机：${esc(c.timing||'未记录')}；最低完成：${esc(c.minimumAcceptable||'未记录')}；状态：${statusLabel(c.status)}</span>${c.reflection?`<br><span class="small">回顾：${esc(c.reflection)}</span>`:''}${c.nextStep?`<br><span class="small">下次：${esc(c.nextStep)}</span>`:''}</div>`).join('')}`:''}${practiceRecords.length?`<h2 class="history-heading">练习记录</h2>${practiceRecords.map(r=>`<div class="record"><div class="top"><b>${esc(r.date)} · ${esc(r.name||practices[r.type]?.name||'练习')}</b><button class="link" onclick="deletePractice('${r.id}')">删除</button></div><span class="small">${r.observation?`观察：${esc(r.observation)}`:'未记录观察。'}</span></div>`).join('')}`:''}${courses.length?`<h2 class="history-heading">课程记录</h2>${courses.map(r=>`<div class="record"><div class="top"><b>${esc(r.date)} · ${esc(r.title||'ACT 课程')}</b><button class="link" onclick="deleteCourse('${r.id}')">删除</button></div><span class="small">${r.observation?`观察：${esc(r.observation)}`:'未记录观察。'}</span></div>`).join('')}`:''}${!actions.length&&!practiceRecords.length&&!courses.length?'<div class="empty">这里会保存你主动记录的行动、练习与课程。</div>':''}`}
    function statusLabel(status){return ({pending:'进行中',done:'完成',partial:'部分完成',skipped:'未完成',paused:'暂停'})[status]||'未记录'}
    function deleteAction(value){store.set('Commitments',commitments().filter(x=>x.id!==value));renderHistory();renderHome()}
    function deletePractice(value){store.set('PracticeHistory',practiceHistory().filter(x=>x.id!==value));renderHistory();renderHome()}
    function deleteCourse(value){const progress=courseProgress();progress.sessions=progress.sessions.filter(x=>x.id!==value);store.set('CourseProgress',progress);renderHistory();renderHome()}
    function clearAll(){if(confirm('确定清空全部行动、练习与课程记录吗？')){store.del('Commitments');store.del('PracticeHistory');store.del('CourseProgress');renderHistory();renderHome()}}
    function closeModal(){$('modal').classList.add('hide');session=null;reviewState=null}
    $('modal').onclick=e=>{if(e.target===$('modal'))closeModal()};
    Object.assign(window,{show,begin,chooseMode,setDomain,toggleExperience,setResponse,askAI,applyAI,startPractice,startCourse,nextSession,saveSession,closeModal,openReview,toggleReview,saveReview,deleteAction,deletePractice,deleteCourse,clearAll});
    renderHome();
  </script>
</body>
</html>
